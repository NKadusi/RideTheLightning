<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מחשבון מרחק וכיוון פגיעה</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GD72Y4WHLE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-GD72Y4WHLE');

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            background-attachment: fixed;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { 
            max-width: 500px; 
            margin: auto; 
            background: rgba(30, 30, 42, 0.6);
            backdrop-filter: blur(10px);
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h2 { color: #ffffff; margin-bottom: 5px; }
        .status { font-size: 0.9em; color: #aaaaaa; margin-bottom: 20px; }
        
        .controls {
            width: 100%;
            margin-top: 20px;
        }
        
        .btn-bottom { 
            width: 100%; 
            height: 100px; 
            border-radius: 12px;
            border: none; 
            color: white; 
            font-size: 22px; 
            font-weight: bold; 
            cursor: pointer; 
            -webkit-tap-highlight-color: transparent;
            background: linear-gradient(135deg, #1b2735 0%, #2a0845 50%, #6441A5 100%);
        }
        .btn-bottom:active { filter: brightness(1.2); }

        @keyframes breatheFire {
            0%   { box-shadow: 0 0 15px rgba(255, 85, 0, 0.3), inset 0 0 10px rgba(255, 85, 0, 0.2); }
            50%  { box-shadow: 0 0 25px rgba(255, 100, 0, 0.6), 0 0 40px rgba(255, 50, 0, 0.4), inset 0 0 15px rgba(255, 100, 0, 0.4); }
            100% { box-shadow: 0 0 15px rgba(255, 85, 0, 0.3), inset 0 0 10px rgba(255, 85, 0, 0.2); }
        }
        
        .direction-icon { pointer-events: none; z-index: 1000 !important; }
        .direction-cone {
            width: 100%; height: 100%;
            background: conic-gradient(from 315deg, rgba(52, 152, 219, 0.7) 0deg 90deg, transparent 90deg);
            border-radius: 50%;
            -webkit-mask-image: radial-gradient(circle at center, black 0%, transparent 60%);
            mask-image: radial-gradient(circle at center, black 0%, transparent 60%);
            transform-origin: center center;
            display: none;
        }
        
        #btn-enable-compass {
            position: absolute; top: 10px; right: 10px;
            z-index: 1002; padding: 6px 12px;
            background: rgba(30, 30, 42, 0.9); color: #4da8da;
            border: 1px solid #4da8da; border-radius: 8px;
            font-size: 13px; font-weight: bold; cursor: pointer;
            backdrop-filter: blur(5px); display: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        @keyframes breatheLightning {
            0%   { box-shadow: 0 0 15px rgba(0, 150, 255, 0.3), inset 0 0 10px rgba(0, 150, 255, 0.2); }
            50%  { box-shadow: 0 0 25px rgba(0, 200, 255, 0.6), 0 0 40px rgba(0, 100, 255, 0.4), inset 0 0 15px rgba(0, 200, 255, 0.4); }
            100% { box-shadow: 0 0 15px rgba(0, 150, 255, 0.3), inset 0 0 10px rgba(0, 150, 255, 0.2); }
        }

        #btn-light { animation: breatheFire 3s infinite ease-in-out; }
        #btn-boom { display: none; animation: breatheLightning 2s infinite ease-in-out; }
        
        #results, #history-container { 
            margin-top: 20px; 
            font-size: 1.1em; 
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        #results { display: none; }
        #results p { margin: 5px 0; font-weight: bold; color: #fff; }
        
        #map-wrapper {
            position: relative;
            margin-top: 20px;
            display: none;
            border-radius: 8px;
            overflow: hidden;
            height: 300px;
            width: 100%;
        }

        #map { 
            height: 100%; 
            width: 100%; 
            z-index: 1; 
            filter: invert(90%) hue-rotate(180deg) brightness(95%) contrast(85%);
        }
        
        .radar-overlay {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            pointer-events: none;
            z-index: 1000;
            background: conic-gradient(from 0deg at 50% 50%, rgba(255, 77, 77, 0) 75%, rgba(255, 77, 77, 0.4) 100%);
            animation: radar-spin 2s linear infinite;
            display: none;
        }
        .radar-overlay::after {
            content: '';
            position: absolute;
            top: 0; left: calc(50% - 1px);
            width: 2px; height: 50%;
            background: #ff4d4d;
            box-shadow: 0 0 15px #ff4d4d;
        }
        .radar-center {
            position: absolute;
            top: 50%; left: 50%;
            width: 8px; height: 8px;
            margin-top: -4px; margin-left: -4px;
            background: #ff4d4d;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff4d4d, 0 0 20px #ff4d4d;
            z-index: 1001;
            display: none;
            pointer-events: none;
            animation: pulse-radar 1s infinite;
        }
        @keyframes radar-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulse-radar {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .alert-zone {
            animation: pulse-alert 2s infinite alternate;
        }
        @keyframes pulse-alert {
            0% { fill-opacity: 0.2; stroke-width: 1; }
            100% { fill-opacity: 0.6; stroke-width: 3; box-shadow: 0 0 10px red; }
        }

        .btn-whatsapp { 
            display: none; 
            background-color: #1b8743; 
            color: white; 
            padding: 15px 20px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-size: 18px;
            font-weight: bold; 
            margin-top: 20px; 
            border: none; 
            cursor: pointer; 
            width: 100%; 
            box-sizing: border-box; 
        }

        .btn-reset { 
            background-color: #b33030; 
            color: white; 
            padding: 8px 15px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-size: 14px;
            font-weight: bold; 
            margin-bottom: 15px; 
            border: none; 
            cursor: pointer; 
            width: 100%; 
            box-sizing: border-box; 
        }

        #history-container { text-align: right; display: none; }
        #history-container h3 { margin: 0 0 10px 0; font-size: 1.1em; color: #4da8da; border-bottom: 1px solid #444; padding-bottom: 5px;}
        #history-list { list-style-type: none; padding: 0; margin: 0; font-size: 0.95em; }
        #history-list li { padding: 8px 0; border-bottom: 1px solid #3a3a3a; display: flex; justify-content: space-between; align-items: center;}
        #history-list li:last-child { border-bottom: none; }
        .history-time { color: #888; font-size: 0.9em; }

        .version {
            margin-top: 20px;
            font-size: 0.8em;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>מד טווח אור</h2>
        <div id="gps-status" class="status">מחפש מיקום וחיישנים... 🛰️</div>

        <div id="map-wrapper">
            <button id="btn-enable-compass">🧭 הפעל מצפן במפה</button>
            <div id="map"></div>
            <div id="radar-overlay" class="radar-overlay"></div>
            <div id="radar-center" class="radar-center"></div>
        </div>
        
        <div class="controls" id="floating-controls">
            <button id="btn-light" class="btn-bottom">ראיתי הבזק ⚡<br><span style="font-size: 14px; font-weight: normal;">(כוון את המכשיר)</span></button>
            <button id="btn-boom" class="btn-bottom">שמעתי פיצוץ 💥</button>
        </div>

        <div id="results">
            <p>זמן שעבר: <span id="time-val">0</span> שניות</p>
            <p>מרחק משוער: <span id="dist-val" style="color: #ff4d4d;">0</span> ק"מ</p>
            <p id="azimuth-container" style="display: none; font-size: 0.9em; color: #4da8da;">כיוון (אזימוט): <span id="azimuth-val"></span>° <span id="compass-arrow" style="display: inline-block; margin-right: 5px; transition: transform 0.5s ease;">⬆️</span></p>
            <p id="location-container" style="display: none; font-size: 0.9em; color: #e0e0e0;">אזור משוער: <span id="location-val" style="font-weight: bold; color: #ffeb3b;">מחפש...</span></p>
        </div>
        
        <div id="alert-status" style="display: none; background: rgba(40, 40, 50, 0.8); border: 1px solid #ffeb3b; color: #ffeb3b; padding: 10px; border-radius: 8px; font-size: 0.9em; margin-top: 15px;"></div>
        
        <button id="btn-whatsapp" class="btn-whatsapp">שתף דיווח ב-WhatsApp 💬</button>

        <div id="history-container">
            <h3>היסטוריית מדידות</h3>
            <button id="btn-reset" class="btn-reset">איפוס מדידות 🗑️</button>
            <ul id="history-list"></ul>
        </div>
        
        <div class="version">גרסה 1.2</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let startTime, endTime;
        let userLat, userLng;
        let map, userMarker, radiusCircle, blastMarker, directionLine;
        const SPEED_OF_SOUND = 340; 
        const EARTH_RADIUS_M = 6371e3;
        let measurementCount = 0; 
        
        let savedBearing = null;
        let continuousBearing = null;
        let savedLat = null, savedLng = null;
        let userDirectionMarker = null;
        let lockedDirectionLine = null;
        let alertLayers = []; // מערך לשמירת אזורי ההתרעה על המפה
        const cityCoordinatesCache = {}; // מטמון לשמירת קואורדינטות של ערים למניעת עומס

        function formatNumber(num) { return num.toLocaleString('he-IL'); }
        function getCurrentTimeString() { return new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute:'2-digit', second:'2-digit' }); }

        // נוסחת Haversine לחישוב קואורדינטת יעד לפי מרחק וכיוון
        function calculateDestination(lat, lng, distanceMeters, bearingDegrees) {
            const d = distanceMeters;
            const brng = bearingDegrees * Math.PI / 180; 
            const lat1 = lat * Math.PI / 180;
            const lon1 = lng * Math.PI / 180;

            const lat2 = Math.asin(Math.sin(lat1) * Math.cos(d / EARTH_RADIUS_M) + Math.cos(lat1) * Math.sin(d / EARTH_RADIUS_M) * Math.cos(brng));
            const lon2 = lon1 + Math.atan2(Math.sin(brng) * Math.sin(d / EARTH_RADIUS_M) * Math.cos(lat1), Math.cos(d / EARTH_RADIUS_M) - Math.sin(lat1) * Math.sin(lat2));

            return { lat: lat2 * 180 / Math.PI, lng: lon2 * 180 / Math.PI };
        }

        // אתחול GPS
        function requestLocation() {
            document.getElementById('gps-status').innerHTML = "מחפש מיקום... 🛰️";
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        userLat = position.coords.latitude;
                        userLng = position.coords.longitude;
                        document.getElementById('gps-status').innerText = "מיקום נקלט בהצלחה 📍";
                        initMap(userLat, userLng);
                        if(userMarker && map) {
                            userMarker.setLatLng([userLat, userLng]);
                            if(userDirectionMarker) userDirectionMarker.setLatLng([userLat, userLng]);
                            map.setView([userLat, userLng], 13);
                        }
                    },
                    (error) => {
                        // מיקום גיבוי - רחובות
                        userLat = 31.8928; userLng = 34.8113;
                        document.getElementById('gps-status').innerHTML = "המיקום חסום. מציג מיקום לבדיקה 📍<br><button onclick='requestLocation()' style='margin-top: 8px; padding: 6px 15px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px;'>נסה שוב לאשר מיקום</button>";
                        initMap(userLat, userLng);
                        
                        if(error.code === 1) { // PERMISSION_DENIED
                            alert("הדפדפן חסם את הגישה למיקום.\n\nבאייפון ודא ש:\n1. שירותי המיקום דולקים (הגדרות -> פרטיות -> שירותי מיקום).\n2. דפדפן Safari מורשה לגשת למיקום.\n3. האתר נטען בכתובת מאובטחת מתחילה ב-HTTPS.");
                        }
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }
        }
        
        requestLocation();

        function initMap(lat, lng) {
            document.getElementById('map-wrapper').style.display = 'block';
            if (!map) {
                map = L.map('map').setView([lat, lng], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
                userMarker = L.circleMarker([lat, lng], { color: 'white', weight: 2, fillColor: '#3498db', fillOpacity: 1, radius: 8 }).addTo(map).bindPopup("המיקום שלך");
                
                userDirectionMarker = L.marker([lat, lng], {
                    icon: L.divIcon({ className: 'direction-icon', html: '<div id="direction-cone" class="direction-cone"></div>', iconSize: [120, 120], iconAnchor: [60, 60] }),
                    interactive: false
                }).addTo(map);
                
                // מציג את כפתור האישור רק אם אנחנו באייפון שעדיין לא קיבל הרשאה למצפן
                if (continuousBearing === null && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    document.getElementById('btn-enable-compass').style.display = 'block';
                }
            }
        }
        
        // בקשת הרשאה מפורשת למצפן באייפון
        document.getElementById('btn-enable-compass').addEventListener('click', () => {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(permissionState => {
                    if (permissionState === 'granted') {
                        document.getElementById('btn-enable-compass').style.display = 'none';
                        window.addEventListener('deviceorientation', handleContinuousOrientation);
                    }
                }).catch(console.error);
            } else {
                document.getElementById('btn-enable-compass').style.display = 'none';
            }
        });

        // האזנה קבועה למצפן מרגע עליית האתר (יעבוד אוטומטית מיד באנדרואיד)
        window.addEventListener('deviceorientationabsolute', handleContinuousOrientation);
        window.addEventListener('deviceorientation', handleContinuousOrientation);

        let isCompassUpdating = false;
        let currentVisualBearing = null;
        const COMPASS_SMOOTHING_FACTOR = 0.05; // פקטור החלקה מוקטן לסינון רעידות המכשיר

        function handleContinuousOrientation(event) {
            let bearing = null;
            if (event.webkitCompassHeading) { bearing = event.webkitCompassHeading; } 
            else if (event.absolute && event.alpha !== null) { bearing = 360 - event.alpha; } // אנדרואיד קריאה מוחלטת
            else if (event.alpha !== null) { bearing = 360 - event.alpha; } // גיבוי
            
            if (bearing !== null) {
                if (currentVisualBearing === null) {
                    currentVisualBearing = bearing;
                } else {
                    // חישוב המרחק הקצר ביותר בין הזוויות למניעת סחרור כשעוברים את ה-360 מעלות
                    let diff = bearing - (currentVisualBearing % 360);
                    if (diff < -180) diff += 360;
                    if (diff > 180) diff -= 360;
                    
                    // הפעלת פילטר החלקה (Low-Pass Filter)
                    if (Math.abs(diff) > 0.5) { // התעלמות מתנודות קטנות כדי למנוע רעידות חזותיות
                        currentVisualBearing += diff * COMPASS_SMOOTHING_FACTOR;
                    }
                }
                
                // שמירת הכיוון המנורמל עבור החישובים המתמטיים (0-360)
                continuousBearing = ((currentVisualBearing % 360) + 360) % 360;

                if (!isCompassUpdating) {
                    isCompassUpdating = true;
                    requestAnimationFrame(() => {
                        const cone = document.getElementById('direction-cone');
                        if (cone) {
                            cone.style.display = 'block';
                            cone.style.transform = `rotate(${currentVisualBearing.toFixed(1)}deg)`;
                        }
                        document.getElementById('btn-enable-compass').style.display = 'none';
                        isCompassUpdating = false;
                    });
                }
            }
        }

        // פונקציית עזר לציור קרן הכיוון הנעולה
        function drawLockedDirectionLine() {
            if (savedLat && savedLng && savedBearing !== null) {
                const farPoint = calculateDestination(savedLat, savedLng, 25000, savedBearing); // מצייר קרן באורך 25 ק"מ שמצביעה לכיוון הנעול
                if (lockedDirectionLine) map.removeLayer(lockedDirectionLine);
                lockedDirectionLine = L.polyline([[savedLat, savedLng], [farPoint.lat, farPoint.lng]], {
                    color: '#ffeb3b', dashArray: '5, 10', weight: 2, opacity: 0.8
                }).addTo(map);
            }
        }

        // כפתור: ראיתי הבזק
        document.getElementById('btn-light').addEventListener('click', () => {
            startTime = performance.now();
            
            // שמירת המיקום והכיוון המדויקים ברגע הלחיצה - כדי שלא ישתנה אח"כ
            savedLat = userLat;
            savedLng = userLng;
            savedBearing = continuousBearing;

            // גיבוי למקרה שהמשתמש באייפון לחץ 'הבזק' וטרם אישר הרשאה למצפן במפה
            if (continuousBearing === null && typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(permissionState => {
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleContinuousOrientation);
                        
                        const tempOrientation = (e) => {
                            if (e.webkitCompassHeading) savedBearing = e.webkitCompassHeading;
                            else if (e.alpha != null) savedBearing = 360 - e.alpha;
                            if (savedBearing !== null) {
                                window.removeEventListener('deviceorientation', tempOrientation);
                                drawLockedDirectionLine();
                            }
                        };
                        window.addEventListener('deviceorientation', tempOrientation);
                    }
                }).catch(console.error);
            }
            
            // הצגת הקו הנעול באופן מיידי אם יש כיוון מהמצפן
            drawLockedDirectionLine();

            document.getElementById('btn-light').style.display = 'none';
            document.getElementById('btn-boom').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('btn-whatsapp').style.display = 'none';
            document.getElementById('radar-overlay').style.display = 'block';
            document.getElementById('radar-center').style.display = 'block';
        
        // מעקב גוגל אנליטיקס ללחיצה על כפתור ההבזק
        if (typeof gtag === 'function') {
            gtag('event', 'flash_clicked', { 'event_category': 'interaction' });
        }
        });

        // כפתור: שמעתי פיצוץ
        document.getElementById('btn-boom').addEventListener('click', () => {
            endTime = performance.now();
            document.getElementById('btn-boom').style.display = 'none';
            document.getElementById('btn-light').style.display = 'block';
            document.getElementById('radar-overlay').style.display = 'none';
            document.getElementById('radar-center').style.display = 'none';
            
            if (lockedDirectionLine) {
                map.removeLayer(lockedDirectionLine);
                lockedDirectionLine = null;
            }
            
            let timeSeconds = (endTime - startTime) / 1000;
            let distanceMeters = Math.round(timeSeconds * SPEED_OF_SOUND);
            let distanceKm = (distanceMeters / 1000).toFixed(2);

            document.getElementById('time-val').innerText = formatNumber(parseFloat(timeSeconds.toFixed(2)));
            document.getElementById('dist-val').innerText = distanceKm;
            
            let currentMeasId = addMeasurementToHistory(distanceKm, timeSeconds, savedBearing);

            if(savedBearing !== null) {
                document.getElementById('azimuth-val').innerText = Math.round(savedBearing);
                document.getElementById('compass-arrow').style.transform = `rotate(${savedBearing}deg)`;
                document.getElementById('azimuth-container').style.display = 'block';
                
                document.getElementById('location-container').style.display = 'block';
                document.getElementById('location-val').innerText = 'מחפש...';

                if (savedLat && savedLng) {
                    const target = calculateDestination(savedLat, savedLng, distanceMeters, savedBearing);
                    setupWhatsApp(distanceKm, timeSeconds, savedBearing, distanceMeters); // הגדרה ראשונית ללא עיר

                    // משיכת שם היישוב דרך Reverse Geocoding
                    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${target.lat}&lon=${target.lng}&zoom=14&accept-language=he`)
                        .then(res => res.json())
                        .then(data => {
                            if(data && data.address) {
                                let cityName = data.address.city || data.address.town || data.address.village || data.address.municipality || data.address.county || data.name || "אזור לא ידוע";
                                document.getElementById('location-val').innerText = cityName;
                                const histLocEl = document.getElementById(`hist-loc-${currentMeasId}`);
                                if (histLocEl) histLocEl.innerText = `אזור: ${cityName}`;
                                setupWhatsApp(distanceKm, timeSeconds, savedBearing, distanceMeters, cityName);
                            } else {
                                document.getElementById('location-val').innerText = "לא נמצא";
                                const histLocEl = document.getElementById(`hist-loc-${currentMeasId}`);
                                if (histLocEl) histLocEl.innerText = `אזור: לא נמצא`;
                            }
                        })
                        .catch(err => {
                            document.getElementById('location-val').innerText = "שגיאת תקשורת";
                            const histLocEl = document.getElementById(`hist-loc-${currentMeasId}`);
                            if (histLocEl) histLocEl.innerText = `אזור: לא זמין`;
                        });
                }
            } else {
                document.getElementById('azimuth-container').style.display = 'none';
                document.getElementById('location-container').style.display = 'none';
                if (savedLat && savedLng) {
                    setupWhatsApp(distanceKm, timeSeconds, savedBearing, distanceMeters);
                }
            }
            
            document.getElementById('results').style.display = 'block';

            if (savedLat && savedLng) {
                drawMapFeatures(distanceMeters, savedBearing);
                
                // קריאה לפונקציה שמחפשת ומציירת את אזעקות האמת מהדקות האחרונות
                fetchAndDrawRecentAlerts();
            }
        
        // מעקב גוגל אנליטיקס ללחיצה על כפתור הפיצוץ (כולל נתוני המדידה)
        if (typeof gtag === 'function') {
            gtag('event', 'boom_clicked', {
                'event_category': 'measurement',
                'distance_meters': distanceMeters,
                'time_seconds': parseFloat(timeSeconds.toFixed(2))
            });
        }
        });

        // כפתור: איפוס מדידות
        document.getElementById('btn-reset').addEventListener('click', () => {
            measurementCount = 0;
            document.getElementById('history-list').innerHTML = '';
            document.getElementById('history-container').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            document.getElementById('btn-whatsapp').style.display = 'none';
            document.getElementById('radar-overlay').style.display = 'none';
            document.getElementById('radar-center').style.display = 'none';
            
            if(radiusCircle) map.removeLayer(radiusCircle);
            if(blastMarker) map.removeLayer(blastMarker);
            if(directionLine) map.removeLayer(directionLine);
            if (lockedDirectionLine) {
                map.removeLayer(lockedDirectionLine);
                lockedDirectionLine = null;
            }
            
            // מחיקת אזורי אזעקה קודמים
            alertLayers.forEach(layer => map.removeLayer(layer));
            alertLayers = [];
            
            if (userLat && userLng) {
                map.setView([userLat, userLng], 13);
            }
        });

        function addMeasurementToHistory(distanceKm, time, bearing) {
            measurementCount++;
            const historyList = document.getElementById('history-list');
            document.getElementById('history-container').style.display = 'block';
            
            let bearingText = bearing !== null ? `<br><span style="color:#4da8da; font-size:0.85em;">כיוון משוער: ${Math.round(bearing)}°</span>` : '';
            let cityText = bearing !== null ? `<br><span id="hist-loc-${measurementCount}" style="color:#ffeb3b; font-size:0.85em;">אזור: מחפש...</span>` : '';
            
            let mapLinkHtml = '';
            if (savedLat && savedLng) {
                let targetLat = savedLat;
                let targetLng = savedLng;
                if (bearing !== null) {
                    const target = calculateDestination(savedLat, savedLng, distanceKm * 1000, bearing);
                    targetLat = target.lat;
                    targetLng = target.lng;
                }
                mapLinkHtml = `<br><a href="https://maps.google.com/?q=${targetLat},${targetLng}" target="_blank" style="color: #ff4d4d; font-size: 0.85em; text-decoration: none; display: inline-block; margin-top: 4px; padding: 2px 6px; border: 1px solid #ff4d4d; border-radius: 4px;">📍 צפה במפה</a>`;
            }

            const li = document.createElement('li');
            li.innerHTML = `<div>מדידה ${measurementCount}: <strong>${distanceKm} ק"מ</strong><br><span style="font-size:0.85em; color:#bbb;">(${formatNumber(parseFloat(time.toFixed(2)))} שניות)</span>${bearingText}${cityText}${mapLinkHtml}</div> <div class="history-time">${getCurrentTimeString()}</div>`;
            historyList.insertBefore(li, historyList.firstChild);
            
            return measurementCount;
        }

        function drawMapFeatures(radius, bearing) {
            if(radiusCircle) map.removeLayer(radiusCircle);
            if(blastMarker) map.removeLayer(blastMarker);
            if(directionLine) map.removeLayer(directionLine);

            let lat = savedLat || userLat;
            let lng = savedLng || userLng;

            // ציור הרדיוס
            radiusCircle = L.circle([lat, lng], { color: '#ff4d4d', weight: 2, fillColor: '#ff4d4d', fillOpacity: 0.15, radius: radius }).addTo(map);
            
            let boundsToFit = radiusCircle.getBounds();

            // אם יש כיוון מהמצפן, צייר קו ונקודה
            if (bearing !== null) {
                const target = calculateDestination(lat, lng, radius, bearing);
                
                // יצירת אייקון אדום מדויק
                const redIcon = L.divIcon({
                    className: 'custom-blast-icon',
                    html: '<div style="font-size: 28px; line-height: 28px; text-shadow: 0 0 15px rgba(255,0,0,0.8);">📍</div>',
                    iconSize: [28, 28],
                    iconAnchor: [14, 28],
                    popupAnchor: [0, -28]
                });

                blastMarker = L.marker([target.lat, target.lng], { icon: redIcon })
                    .addTo(map).bindPopup("מיקום משוער של ההדף").openPopup();

                directionLine = L.polyline([[lat, lng], [target.lat, target.lng]], {
                    color: '#ff4d4d', dashArray: '8, 8', weight: 3
                }).addTo(map);
            }

            map.fitBounds(boundsToFit);
        }

        // משיכת התרעות אמת מפיקוד העורף וציורן
        function fetchAndDrawRecentAlerts() {
            alertLayers.forEach(layer => map.removeLayer(layer));
            alertLayers = [];

            // שימוש ב-CORS Proxy כדי לעקוף את חסימת הדפדפן מול שרתי פיקוד העורף
            const orefUrl = 'https://www.oref.org.il/WarningMessages/History/AlertsHistory.json';
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(orefUrl)}`;

            fetch(proxyUrl)
                .then(response => response.json())
                .then(data => {
                    if (data && data.contents) {
                        const alerts = JSON.parse(data.contents);
                        processAlerts(alerts);
                    }
                })
                .catch(error => console.error("שגיאה במשיכת התרעות מפיקוד העורף:", error));
        }

        function processAlerts(alerts) {
            if (!Array.isArray(alerts)) return;
            const now = new Date();
            const recentCities = new Set();

            alerts.forEach(alert => {
                // המרת תאריך למבנה בטוח (החלפת מקפים בלוכסנים למניעת שגיאות בדפדפנים מסוימים)
                const alertTime = new Date(alert.date.replace(/-/g, '/'));
                const diffMinutes = (now - alertTime) / (1000 * 60);

                // סינון: רק אזעקות מה-15 דקות האחרונות
                if (diffMinutes >= 0 && diffMinutes <= 15) {
                    recentCities.add(alert.data); // alert.data מכיל את שם היישוב
                }
            });

            // המרת שמות יישובים לקואורדינטות עם השהייה קלה (כדי לא להיחסם ב-OpenStreetMap)
            let delay = 0;
            recentCities.forEach(cityName => {
                setTimeout(() => geocodeAndDrawAlert(cityName), delay);
                delay += 1100; 
            });
        }

        function geocodeAndDrawAlert(cityName) {
            // ניקוי שם העיר (למשל 'אשדוד - א' הופך ל-'אשדוד') כדי לשפר את תוצאות החיפוש במפה
            const searchName = cityName.split('-')[0].trim();

            // שימוש במטמון אם כבר חיפשנו את העיר הזו באותו סשן
            if (cityCoordinatesCache[searchName]) {
                drawAlertCircle(cityCoordinatesCache[searchName], cityName);
                return;
            }

            fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(searchName + ', ישראל')}&limit=1`)
                .then(res => res.json())
                .then(data => {
                    if (data && data.length > 0) {
                        const coords = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
                        cityCoordinatesCache[searchName] = coords;
                        drawAlertCircle(coords, cityName);
                    }
                })
                .catch(e => console.error("שגיאה במציאת קואורדינטות לעיר:", searchName));
        }

        function drawAlertCircle(coords, originalName) {
            const alertCircle = L.circle([coords.lat, coords.lng], {
                color: '#ff0000',
                fillColor: '#ff0000',
                weight: 2,
                radius: 1500, // רדיוס של קילומטר וחצי שמייצג את אזור ההתרעה
                className: 'alert-zone'
            }).addTo(map).bindPopup(`<b style='color:red;'>התרעת צבע אדום</b><br>${originalName}`);
            
            alertLayers.push(alertCircle);
        }

        function setupWhatsApp(distanceKm, time, bearing, distanceMeters, cityName = null) {
            const waBtn = document.getElementById('btn-whatsapp');
            waBtn.style.display = 'block';
            
            let locationLink = '';
            let cityString = cityName ? `\n🏙️ אזור משוער: ${cityName}` : '';
            
            let lat = savedLat || userLat;
            let lng = savedLng || userLng;

            if (bearing !== null) {
                const target = calculateDestination(lat, lng, distanceMeters, bearing);
                locationLink = `מיקום ההדף המשוער: http://googleusercontent.com/maps.google.com/3${target.lat},${target.lng}`;
            } else {
                locationLink = `המיקום שלי: http://googleusercontent.com/maps.google.com/4${lat},${lng}`;
            }

            const text = `⚠️ מדדתי אירוע הדף!\n⏱️ זמן מעבר קול: ${formatNumber(parseFloat(time.toFixed(2)))} שניות.\n📏 מרחק משוער: ${distanceKm} ק"מ מהמיקום שלי.${cityString}\n📍 ${locationLink}`;
            waBtn.onclick = () => { window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank'); };
        }
    </script>
</body>
</html>
